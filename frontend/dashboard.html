<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MokaPOS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #F5F7FA;
            display: flex;
            height: 100vh;
        }
        /* ESTILOS DEL MENÚ LATERAL */
        .sidebar {
            width: 250px;
            background-color: #0D47A1;
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }
        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: background 0.3s;
        }
        .sidebar a:hover {
            background-color: #1976D2;
        }
        
        /* ESTILOS DEL ÁREA PRINCIPAL */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .user-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-block;
            margin-bottom: 30px;
        }
        .user-card h3 { margin: 0 0 10px 0; color: #1F2937; }
        .badge-rol {
            background: #E3F2FD;
            color: #0D47A1;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .btn-logout:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>☕ MokaPOS</h2>
        
        <a href="ventas.html">🛒 Punto de Venta</a>
        <a href="caja.html">💰 Control de Caja</a>
        <a href="apartados.html">📦 Apartados</a>
        
        <a href="inventario.html" class="solo-admin">📊 Inventario y Kardex</a>
        <a href="compras.html" class="solo-admin">🚚 Compras a Proveedores</a>
        <a href="parametros.html" class="solo-admin">⚙️ Configuración</a>
    </div>

    <div class="main-content">
        <div class="user-card">
            <h3 id="nombre-usuario">Cargando usuario...</h3>
            <span class="badge-rol" id="rol-usuario">Rol</span><br>
            <button class="btn-logout" onclick="cerrarSesion()">Salir del Sistema</button>
        </div>

        <h1>Bienvenido al Panel de Control</h1>
        <p>Selecciona una opción del menú lateral para comenzar a operar.</p>
    </div>

    <script>
        // 1. Verificar sesión (Guardia de entrada)
        if (!localStorage.getItem('usuario_id')) {
            window.location.href = 'index.html';
        }

        // 2. Leer datos de la memoria
        const rolActual = localStorage.getItem('usuario_rol');
        const nombreActual = localStorage.getItem('usuario_nombre');

        // 3. Imprimir datos en la tarjeta
        document.getElementById('nombre-usuario').innerText = nombreActual;
        document.getElementById('rol-usuario').innerText = rolActual;

        // 4. Lógica de Roles (RBAC)
        if (rolActual === 'CAJERO') {
            // Buscamos todos los menús prohibidos
            const elementosAdmin = document.querySelectorAll('.solo-admin');
            // Los ocultamos de la vista
            elementosAdmin.forEach(elemento => {
                elemento.style.display = 'none';
            });
            console.log("Interfaz adaptada para Cajero.");
        }

        // 5. Función de cerrar sesión
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
