<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MokaPOS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .login-card h2 {
            color: #0D47A1;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1F2937;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-login {
            background-color: #1976D2;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #0D47A1;
        }
        #mensaje-error {
            color: red;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>
<body>

    <div class="login-card">
        <h2>🔒 MokaPOS</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="Ej. admin" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="pin">PIN de Acceso</label>
                <input type="password" id="pin" placeholder="****" required inputmode="numeric" maxlength="6">
            </div>
            <button type="submit" class="btn-login" id="btnSubmit">INGRESAR</button>
            <div id="mensaje-error">Usuario o PIN incorrectos</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            const btnSubmit = document.getElementById('btnSubmit');
            const mensajeError = document.getElementById('mensaje-error');

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Verificando...';
            mensajeError.style.display = 'none';

            try {
                // Hacemos la petición a tu backend en Node.js
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, pin })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardamos la Sesión en el navegador
                    localStorage.setItem('usuario_id', data.usuario.id);
                    localStorage.setItem('usuario_nombre', data.usuario.nombre);
                    localStorage.setItem('usuario_rol', data.usuario.rol);
                    
                    // ¡Redirigimos al dashboard!
                    window.location.href = 'dashboard.html';
                } else {
                    mensajeError.textContent = data.error || 'Error al iniciar Sesión';
                    mensajeError.style.display = 'block';
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = 'INGRESAR';
                }
            } catch (error) {
                mensajeError.textContent = 'Error de conexión con el servidor';
                mensajeError.style.display = 'block';
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'INGRESAR';
            }
        });
    </script>
</body>
</html>
