<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café La Paz - Compras a Proveedores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        sidebar: '#020617',
                        sidebarHover: '#0f172a',
                        topbar: '#ffffff',
                        mainBg: '#f8fafc',
                        accent: '#f97316',
                        glass: 'rgba(255, 255, 255, 0.8)'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0,0,0,0.02)',
                    }
                } 
            } 
        }
    </script>

</head>
<body class="bg-mainBg font-sans flex min-h-screen text-slate-800">

    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-sidebar text-slate-400 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full md:sticky md:top-0 md:h-screen shrink-0 md:translate-x-0 transition-all duration-300 ease-in-out border-r border-slate-800">
        <div class="h-16 flex items-center px-6 gap-3 border-b border-slate-800/50">
            <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/20">
                <i class="fa-solid fa-mug-hot text-white"></i>
            </div>
            <span class="text-white font-bold text-xl tracking-tight italic">Café <span class="text-accent">La Paz</span></span>
            <button onclick="toggleSidebar()" class="md:hidden ml-auto text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="p-4 border-b border-slate-800/30">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-white ring-2 ring-slate-700/50">
                    <span id="avatar-letra" class="font-black text-sm text-orange-500">U</span>
                </div>
                <div class="overflow-hidden">
                    <p id="nombre-usuario" class="text-slate-200 text-sm font-bold truncate tracking-tight">Cargando...</p>
                    <p id="rol-usuario" class="text-[9px] text-emerald-500 font-black uppercase tracking-[0.2em] opacity-80">ROL</p>
                </div>
            </div>
            <button onclick="cerrarSesión()" class="w-full flex items-center justify-center gap-2 py-2.5 text-[10px] font-black uppercase tracking-widest border border-slate-800 rounded-xl hover:bg-slate-900 hover:text-white transition-all text-slate-500">
                <i class="fa-solid fa-power-off text-[10px]"></i> Salir
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-gauge-high w-5 text-center text-orange-500/60"></i> <span>Dashboard</span>
            </a>
            <a href="almacen_stock.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-boxes-stacked w-5 text-center text-orange-500/60"></i> <span>Stock Actual</span>
            </a>
            <a href="compras.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-orange-500/10 text-orange-500 font-bold solo-admin">
                <i class="fa-solid fa-cart-flatbed w-5 text-center text-orange-500/60"></i> <span>Compras Insumos</span>
            </a>
            <a href="inventario.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-clipboard-check w-5 text-center text-orange-500/60"></i> <span>Auditoría</span>
            </a>
            <a href="ventas.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-shop w-5 text-center text-orange-500/60"></i> <span>Punto de Venta</span>
            </a>
            <a href="caja.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-cash-register w-5 text-center text-orange-500/60"></i> <span>Control Caja</span>
            </a>
            <a href="parametros.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-gears w-5 text-center text-orange-500/60"></i> <span>Parámetros</span>
            </a>
                    <a href="pedidos_internos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium">
                <i class="fa-solid fa-clipboard-list w-5 text-center text-orange-500/60"></i> <span>Pedidos Internos</span>
            </a>
                    <a href="informe_general.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-file-pdf w-5 text-center text-orange-500/60"></i> <span>Informe General</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 min-h-screen">
        <header class="h-16 bg-white/70 backdrop-blur-md text-slate-900 border-b border-slate-200/60 flex items-center justify-between px-6 sticky top-0 z-30 shadow-premium">
            <button onclick="toggleSidebar()" class="focus:outline-none hover:bg-logoBg p-2 rounded transition-colors md:hidden"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-base sm:text-lg font-bold tracking-wide truncate ml-2 md:ml-0">Recepción y Compras</h1>
            <div class="flex items-center shrink-0 ml-2"><span id="header-nombre-usuario" class="mr-2 text-sm hidden sm:block">Cargando...</span></div>
        </header>

        <div class="flex-1 overflow-hidden p-2 sm:p-4 md:p-6 flex flex-col">
            <div class="flex-1 flex flex-col bg-white rounded shadow-md border-t-4 border-stone-800 overflow-hidden">
                <div class="p-3 sm:p-4 border-b flex justify-between items-center bg-white shrink-0">
                    <h2 class="font-bold text-stone-800 text-base sm:text-lg"><i class="fa-solid fa-truck-ramp-box mr-2"></i>Historial de Ingresos</h2>
                    <a href="compras_reporte.html" class="bg-stone-800 hover:bg-stone-900 shadow-sm text-white px-3 py-1.5 rounded text-xs font-bold transition-all flex items-center gap-2">
                        <i class="fa-solid fa-list-ul"></i> <span class="hidden sm:inline">Listar por Mes</span>
                    </a>
                </div>
                
                <!-- NUEVA FILA: Compra rápida -->
                <div class="bg-slate-50 border-t border-b border-gray-100 p-3 flex flex-wrap xl:flex-nowrap gap-3 items-end border-b  shrink-0">
                    <div class="flex-1 min-w-[150px]">
                        <label class="block text-[10px] font-bold text-orange-600 mb-1 uppercase">Proveedor</label>
                        <div class="flex gap-1">
                            <select id="selProveedor" class="w-full border rounded px-2 py-1.5 text-xs focus:ring-orange-500 font-bold text-gray-700 outline-none"></select>
                            <button onclick="abrirModalNuevoProveedor()" class="bg-stone-700 hover:bg-stone-900 text-white px-2 rounded min-w-[30px]" title="Añadir"><i class="fa-solid fa-plus text-[10px]"></i></button>
                        </div>
                    </div>
                    
                    <div class="flex-1 min-w-[180px]">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Insumo Base</label>
                        <select id="selInsumo" class="w-full border rounded px-2 py-1.5 text-xs focus:ring-orange-500 font-bold text-stone-800 outline-none" onchange="actualizarUnidadLabel()"></select>
                    </div>

                    <div class="flex-1 min-w-[100px]">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Unidad</label>
                        <input type="text" id="inpUnidadCompra" placeholder="Ej: L, kg" class="w-full border rounded px-2 py-1.5 text-xs text-center font-bold outline-none focus:border-orange-500">
                    </div>

                    <div class="w-24">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Cant</label>
                        <input type="number" id="inpContenido" min="0.1" step="0.1" class="w-full border rounded px-2 py-1.5 text-xs text-center font-bold outline-none focus:border-orange-500">
                    </div>

                    <div class="w-24">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Costo Total(Bs.)</label>
                        <input type="number" id="inpCosto" value="0.00" min="0" step="0.1" class="w-full border rounded px-2 py-1.5 text-xs text-center font-black text-orange-600 outline-none focus:border-orange-500">
                    </div>

                    <div class="w-28 border-l pl-3 border-orange-200">
                        <label class="block text-[10px] font-bold text-red-500 mb-1 uppercase">Vence (Opcional)</label>
                        <input type="date" id="inpVence" class="w-full border rounded px-2 py-1 text-[10px] text-red-700 outline-none focus:border-orange-500">
                    </div>

                    <div class="flex-1 min-w-[200px] border-l pl-3 border-gray-200 flex flex-col justify-end">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Factura/Recibo <i class="fa-solid fa-receipt"></i></label>
                        <div class="flex items-center gap-2">
                            <img id="previewFotoFactura" src="" class="hidden w-8 h-8 object-cover rounded shadow-sm border border-gray-300 shrink-0">
                            <div class="flex gap-1">
                                <input type="file" id="inpFacturaGaleria" accept="image/*" class="hidden" onchange="previewImagenCompra(event, 'previewFotoFactura')">
                                <button onclick="document.getElementById('inpFacturaGaleria').click()" class="bg-white border border-gray-300 hover:bg-gray-50 text-slate-700 px-2 py-1.5 rounded text-[10px] shadow-sm"><i class="fa-solid fa-image font-bold"></i></button>
                                <input type="file" id="inpFacturaCamara" accept="image/*" capture="environment" class="hidden" onchange="previewImagenCompra(event, 'previewFotoFactura')">
                                <button onclick="document.getElementById('inpFacturaCamara').click()" class="bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 px-2 py-1.5 rounded text-[10px] shadow-sm flex-1 whitespace-nowrap"><i class="fa-solid fa-camera mr-1"></i> Recibo</button>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 min-w-[200px] border-l pl-3 border-gray-200 flex flex-col justify-end">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Foto Producto <i class="fa-solid fa-box"></i></label>
                        <div class="flex items-center gap-2">
                            <img id="previewFotoInsumo" src="" class="hidden w-8 h-8 object-cover rounded shadow-sm border border-gray-300 shrink-0">
                            <div class="flex gap-1">
                                <input type="file" id="inpInsumoGaleria" accept="image/*" class="hidden" onchange="previewImagenCompra(event, 'previewFotoInsumo')">
                                <button onclick="document.getElementById('inpInsumoGaleria').click()" class="bg-white border border-gray-300 hover:bg-gray-50 text-slate-700 px-2 py-1.5 rounded text-[10px] shadow-sm"><i class="fa-solid fa-image"></i></button>
                                <input type="file" id="inpInsumoCamara" accept="image/*" capture="environment" class="hidden" onchange="previewImagenCompra(event, 'previewFotoInsumo')">
                                <button onclick="document.getElementById('inpInsumoCamara').click()" class="bg-orange-50 border border-orange-200 hover:bg-orange-100 text-orange-700 px-2 py-1.5 rounded text-[10px] shadow-sm flex-1 whitespace-nowrap"><i class="fa-solid fa-camera mr-1"></i> Insumo</button>
                            </div>
                        </div>
                    </div>

                    <div class="shrink-0">
                        <button onclick="ejecutarCompraRapida()" id="btnGuardarCompraRapida" class="bg-orange-600 hover:bg-orange-700 transition-all duration-200 shadow-md text-white px-4 py-1.5 rounded font-bold text-xs h-[34px] flex items-center justify-center">
                            <i class="fa-solid fa-check mr-1 text-[10px]"></i> Comprar
                        </button>
                    </div>
                </div>

                <div class="flex-1 overflow-auto p-2 sm:p-4 bg-slate-50">
                    <div id="tabla-compras" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        <!-- Las tarjetas JS irán aquí -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalNuevoProveedor" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col">
            <div class="bg-gray-800 p-4 flex justify-between items-center text-white shrink-0">
                <h3 class="text-base font-bold"><i class="fa-solid fa-truck mr-2"></i>Nuevo Proveedor</h3>
                <button onclick="cerrarModalNuevoProveedor()" class="text-gray-300 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-5">
                <div class="mb-3">
                    <label class="block text-xs font-bold text-gray-700 mb-1">Nombre / Empresa *</label>
                    <input type="text" id="inpProvNombre" class="w-full border rounded px-3 py-2 text-sm focus:ring-gray-800 outline-none" required>
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-bold text-gray-700 mb-1">Teléfono</label>
                    <input type="text" id="inpProvTel" class="w-full border rounded px-3 py-2 text-sm focus:ring-gray-800 outline-none">
                </div>
                <button onclick="guardarProveedor()" class="w-full bg-gray-800 hover:bg-black text-white font-bold py-2 rounded shadow">
                    Guardar
                </button>
            </div>
        </div>
    </div>

    <script src="js/compras.js"></script>
    <script>
        const rolGuardia = localStorage.getItem('usuario_rol');
        if (!localStorage.getItem('usuario_id')) {
            window.location.href = 'index.html'; 
        } else if (rolGuardia === 'CAJERO') {
            alert('⛔ Acceso denegado: Control exclusivo de Administradores.');
            window.location.href = 'dashboard.html';
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function cerrarSesión() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const nombreActual = localStorage.getItem('usuario_nombre');
            const rolActual = localStorage.getItem('usuario_rol');
            if (nombreActual) {
                document.getElementById('nombre-usuario').innerText = nombreActual;
                document.getElementById('header-nombre-usuario').innerText = nombreActual;
                document.getElementById('avatar-letra').innerText = nombreActual.charAt(0).toUpperCase();
            }
            if (rolActual) {
                document.getElementById('rol-usuario').innerHTML = `<i class="fa-solid fa-circle text-[10px] mr-1"></i> ${rolActual}`;
            }
            if (rolActual === 'CAJERO') {
                document.querySelectorAll('.solo-admin').forEach(el => el.style.display = 'none');
            }
        });
    </script>
    <script src="js/security_guard.js"></script>
</body>
</html>
