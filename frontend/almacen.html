<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MokaPOS - Almacén</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { sidebar: '#3E2723', sidebarHover: '#4E342E', topbar: '#5D4037', logoBg: '#4E342E', mainBg: '#F4F1EA' } } }
        }
    </script>
</head>
<body class="bg-mainBg flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-sidebar text-gray-300 flex flex-col hidden md:flex shadow-xl z-20">
        <div class="h-14 bg-logoBg flex items-center justify-center text-white font-bold text-xl tracking-wider border-b border-[#3E2723]">
            <i class="fa-solid fa-mug-hot text-[#D7CCC8] mr-2"></i> MokaPOS
        </div>
        <div class="flex items-center p-4 border-b border-[#5D4037]">
            <div class="w-10 h-10 rounded-full bg-[#8D6E63] flex items-center justify-center text-white font-bold mr-3 shadow-inner">A</div>
            <div><p class="text-white text-sm font-semibold">admin</p><p class="text-xs text-emerald-400"><i class="fa-solid fa-circle text-[10px] mr-1"></i> CAJERO</p></div>
        </div>
        <nav class="flex-1 overflow-y-auto py-2 text-sm">
            <ul class="space-y-1">
                <li><a href="index.html" class="flex items-center px-4 py-2 hover:bg-sidebarHover hover:text-white transition-colors"><i class="fa-solid fa-house w-6 text-center text-[#BCAAA4]"></i><span>Inicio</span></a></li>
                <li><a href="almacen.html" class="flex items-center px-4 py-3 bg-sidebarHover border-l-4 border-[#E65100] text-white"><i class="fa-solid fa-box w-6 text-center text-[#FFB74D]"></i><span class="font-medium">Almacén</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen">
        <header class="h-14 bg-topbar text-white flex items-center justify-between px-4 shadow-md z-10 shrink-0">
            <button class="focus:outline-none hover:bg-logoBg p-2 rounded transition-colors"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-lg font-bold tracking-wide">Control de Almacén e Insumos</h1>
            <div class="flex items-center"><span class="mr-2 text-sm">admin</span><i class="fa-solid fa-caret-down text-xs"></i></div>
        </header>

        <div class="flex-1 flex flex-col overflow-hidden p-4 md:p-6 gap-6">
            
            <div class="h-1/2 flex flex-col bg-white rounded shadow-md border-t-4 border-[#5D4037] overflow-hidden relative">
                
                <div class="p-4 border-b flex justify-between items-center bg-[#FAFAFA] shrink-0">
                    <h2 class="font-bold text-[#4E342E] text-lg"><i class="fa-solid fa-boxes-stacked mr-2"></i>Stock Actual</h2>
                    <div class="flex space-x-3 items-center">
                        <div class="relative w-56">
                            <input type="text" id="searchInput" placeholder="Buscar insumo..." class="w-full pl-9 pr-3 py-1.5 rounded shadow-sm border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#8D6E63] text-sm">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        </div>
                        <button onclick="abrirModal()" class="bg-[#E65100] hover:bg-[#EF6C00] text-white px-4 py-1.5 rounded shadow transition-colors font-medium text-sm flex items-center">
                            <i class="fa-solid fa-plus mr-2"></i> Nuevo Insumo
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto">
                    <table class="min-w-full w-full">
                        <thead class="bg-gray-100 sticky top-0 z-10">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-[#4E342E] uppercase tracking-wider">Insumo</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-[#4E342E] uppercase tracking-wider">Unidad</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-[#4E342E] uppercase tracking-wider">Stock</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-[#4E342E] uppercase tracking-wider">Mínimo</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-[#4E342E] uppercase tracking-wider">Estado</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-[#4E342E] uppercase tracking-wider">Ajuste Rápido</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-insumos" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="h-1/2 flex flex-col bg-white rounded shadow-md border-t-4 border-[#8D6E63] overflow-hidden relative">
                <div class="p-4 border-b bg-[#FAFAFA] shrink-0">
                    <h2 class="font-bold text-[#4E342E] text-lg"><i class="fa-solid fa-clock-rotate-left mr-2"></i>Historial de Movimientos</h2>
                </div>
                
                <div class="flex-1 overflow-y-auto">
                    <table class="min-w-full w-full">
                        <thead class="bg-gray-100 sticky top-0 z-10">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold text-[#4E342E] uppercase tracking-wider">Fecha y Hora</th>
                                <th class="px-4 py-3 text-left text-xs font-bold text-[#4E342E] uppercase tracking-wider">Insumo</th>
                                <th class="px-4 py-3 text-center text-xs font-bold text-[#4E342E] uppercase tracking-wider">Tipo</th>
                                <th class="px-4 py-3 text-right text-xs font-bold text-[#4E342E] uppercase tracking-wider">Cantidad</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-movimientos" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="modalInsumo" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-96 p-6 border-t-4 border-[#E65100]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-[#3E2723]">Registrar Nuevo Insumo</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="formInsumo" onsubmit="guardarNuevoInsumo(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Insumo</label>
                    <input type="text" id="inputNombre" required placeholder="Ej: Vasos de 8oz, Canela..." class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-[#8D6E63] focus:border-[#8D6E63]">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Unidad de Medida</label>
                    <select id="selectUnidad" required class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-[#8D6E63]">
                        <option value="gr">Gramos (gr)</option>
                        <option value="ml">Mililitros (ml)</option>
                        <option value="unidad">Unidad / Pieza</option>
                        <option value="bolsa">Bolsa</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Stock Inicial</label>
                        <input type="number" id="inputStock" required min="0" step="0.1" value="0" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-[#8D6E63]">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Stock Mínimo</label>
                        <input type="number" id="inputMinimo" required min="0" step="0.1" value="10" class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-[#8D6E63]">
                    </div>
                </div>

                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="cerrarModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300 transition-colors">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-[#5D4037] text-white rounded hover:bg-[#4E342E] transition-colors">Guardar Insumo</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/almacen.js"></script>
</body>
</html>
