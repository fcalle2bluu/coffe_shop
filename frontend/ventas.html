<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café La Paz - Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        sidebar: '#020617',
                        sidebarHover: '#0f172a',
                        topbar: '#ffffff',
                        mainBg: '#f8fafc',
                        accent: '#f97316',
                        glass: 'rgba(255, 255, 255, 0.8)'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0,0,0,0.02)',
                    }
                } 
            } 
        }
    </script>

</head>
<body class="bg-mainBg font-sans flex min-h-screen text-slate-800">

    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-sidebar text-slate-400 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full md:sticky md:top-0 md:h-screen shrink-0 md:translate-x-0 transition-all duration-300 ease-in-out border-r border-slate-800">
        <div class="h-16 flex items-center px-6 gap-3 border-b border-slate-800/50">
            <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/20">
                <i class="fa-solid fa-mug-hot text-white"></i>
            </div>
            <span class="text-white font-bold text-xl tracking-tight italic">Café <span class="text-accent">La Paz</span></span>
            <button onclick="toggleSidebar()" class="md:hidden ml-auto text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="p-4 border-b border-slate-800/30">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-white ring-2 ring-slate-700/50">
                    <span id="avatar-letra" class="font-black text-sm text-orange-500">U</span>
                </div>
                <div class="overflow-hidden">
                    <p id="nombre-usuario" class="text-slate-200 text-sm font-bold truncate tracking-tight">Cargando...</p>
                    <p id="rol-usuario" class="text-[9px] text-emerald-500 font-black uppercase tracking-[0.2em] opacity-80">ROL</p>
                </div>
            </div>
            <button onclick="cerrarSesión()" class="w-full flex items-center justify-center gap-2 py-2.5 text-[10px] font-black uppercase tracking-widest border border-slate-800 rounded-xl hover:bg-slate-900 hover:text-white transition-all text-slate-500">
                <i class="fa-solid fa-power-off text-[10px]"></i> Salir
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-gauge-high w-5 text-center text-orange-500/60"></i> <span>Dashboard</span>
            </a>
            <a href="almacen_stock.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-boxes-stacked w-5 text-center text-orange-500/60"></i> <span>Stock Actual</span>
            </a>
            <a href="compras.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-cart-flatbed w-5 text-center text-orange-500/60"></i> <span>Compras Insumos</span>
            </a>
            <a href="inventario.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-clipboard-check w-5 text-center text-orange-500/60"></i> <span>Auditoría</span>
            </a>
            <a href="ventas.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-orange-500/10 text-orange-500 font-bold ">
                <i class="fa-solid fa-shop w-5 text-center text-orange-500/60"></i> <span>Punto de Venta</span>
            </a>
            <a href="caja.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-cash-register w-5 text-center text-orange-500/60"></i> <span>Control Caja</span>
            </a>
            <a href="parametros.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-gears w-5 text-center text-orange-500/60"></i> <span>Parámetros</span>
            </a>
                    <a href="pedidos_internos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium">
                <i class="fa-solid fa-clipboard-list w-5 text-center text-orange-500/60"></i> <span>Pedidos Internos</span>
            </a>
                    <a href="informe_general.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-file-pdf w-5 text-center text-orange-500/60"></i> <span>Informe General</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 min-h-screen">
        <header class="h-16 bg-white/70 backdrop-blur-md text-slate-900 border-b border-slate-200/60 flex items-center justify-between px-6 sticky top-0 z-30 shadow-premium">
            <button onclick="toggleSidebar()" class="focus:outline-none hover:bg-logoBg p-2 rounded transition-colors md:hidden"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-base sm:text-lg font-bold tracking-wide truncate ml-2 md:ml-0 flex-1">Terminal Táctil</h1>
            <div class="text-xs sm:text-sm font-semibold text-orange-500 shrink-0" id="reloj">--:--:--</div>
        </header>

        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            
            <div class="w-full md:w-2/3 p-2 sm:p-4 flex flex-col bg-mainBg overflow-hidden flex-1 md:flex-none h-1/2 md:h-auto">
                <div class="mb-3 sm:mb-4 relative shadow-sm shrink-0 flex gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="buscarProducto" placeholder="Buscar producto..." class="w-full pl-10 pr-4 py-2 sm:py-3 rounded-lg border-2 border-transparent focus:border-orange-500 focus:outline-none text-gray-700 font-medium text-sm sm:text-base bg-white shadow-sm">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 sm:top-4 text-gray-400"></i>
                    </div>
                    <button class="solo-admin bg-stone-800 text-white px-4 rounded-lg shadow-sm font-bold hover:bg-stone-900 transition-colors shrink-0 flex items-center gap-2" onclick="abrirModalProducto()">
                        <i class="fa-solid fa-plus"></i> <span class="hidden sm:inline">Nuevo</span>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto pr-1 sm:pr-2">
                    <div id="grid-productos" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2 sm:gap-4 pb-4">
                        </div>
                </div>
            </div>

            <div class="w-full md:w-1/3 bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] md:shadow-xl md:border-l border-t-2 md:border-t-0 flex flex-col z-10 h-[45vh] md:h-auto shrink-0">
                <div class="p-3 sm:p-4 bg-white border-b border-gray-200 shrink-0">
                    <h2 class="text-stone-800 font-bold text-base sm:text-lg flex justify-between items-center">
                        <span><i class="fa-solid fa-receipt mr-2"></i>Ticket</span>
                        <button onclick="limpiarCarrito()" class="text-red-500 hover:text-red-700 text-xs sm:text-sm font-normal"><i class="fa-solid fa-trash-can mr-1"></i>Limpiar</button>
                    </h2>
                </div>

                <div class="flex-1 overflow-y-auto p-2 sm:p-4 bg-white" id="ticket-items">
                    <div class="text-center text-gray-400 mt-10 text-sm">
                        <i class="fa-solid fa-basket-shopping text-3xl sm:text-4xl mb-2 sm:mb-3 opacity-20"></i>
                        <p>No hay productos</p>
                    </div>
                </div>

                <div class="bg-[#F5F5F5] border-t p-3 sm:p-4 flex flex-col gap-2 sm:gap-3 shrink-0">
                    <div class="flex justify-between items-center text-gray-600 text-sm">
                        <span class="font-medium">Subtotal</span>
                        <span id="subtotal-ticket" class="font-bold">Bs. 0.00</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-lg sm:text-xl font-bold text-stone-900">TOTAL</span>
                        <span class="text-2xl sm:text-3xl font-black text-orange-600" id="total-ticket">Bs. 0.00</span>
                    </div>
                    
                    <div class="mt-1 sm:mt-2">
                        <select id="metodo-pago" class="w-full border border-gray-300 text-stone-800 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors rounded-lg p-2 sm:p-3 bg-white focus:ring-2 focus:ring-orange-500 font-medium text-gray-700 text-sm">
                            <option value="EFECTIVO">💵 Efectivo</option>
                            <option value="QR">📱 QR Transferencia</option>
                            <option value="TARJETA">💳 Tarjeta POS</option>
                        </select>
                    </div>

                    <button onclick="procesarCobro()" id="btn-cobrar" class="w-full bg-stone-700 hover:bg-stone-800 text-white font-bold py-3 sm:py-4 rounded-lg shadow-lg text-base sm:text-lg mt-1 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        COBRAR Bs. <span id="btn-total">0.00</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <div id="modalExito" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 flex flex-col items-center animate-[bounce_0.3s_ease-out]">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-xl sm:text-2xl font-black text-gray-800 mb-1">¡Venta Exitosa!</h2>
            <p class="text-sm text-gray-500 mb-6" id="info-ticket">Ticket #0000</p>
            
            <button onclick="cerrarModalExito()" class="w-full bg-orange-600 hover:bg-orange-700 transition-all duration-200 shadow-md hover:shadow-lg text-white font-bold py-3 rounded-lg mb-3 shadow">
                Nueva Venta
            </button>
            <button class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-lg transition-colors">
                <i class="fa-solid fa-print mr-2"></i> Imprimir Recibo
            </button>
        </div>
    </div>

    <!-- Modal Agregar/Editar Producto (Solo Admin) -->
    <div id="modalProductoAdmin" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-[60] p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 border-t-4 border-stone-800 flex flex-col">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                <h3 class="text-lg font-bold text-stone-900" id="titulo-modal-producto">Nuevo Producto</h3>
                <button onclick="cerrarModalProducto()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="formProducto" onsubmit="event.preventDefault(); guardarProducto();" class="space-y-4">
                <input type="hidden" id="inpProdId">
                
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Nombre del Producto</label>
                    <input type="text" id="inpProdNombre" required class="w-full border rounded px-3 py-2 text-sm focus:ring-orange-500 outline-none border-gray-300 text-stone-800 focus:ring-2 transition-colors font-semibold">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Precio de Venta (Bs.)</label>
                    <input type="number" id="inpProdPrecio" required step="0.10" min="0" class="w-full border rounded px-3 py-2 text-sm focus:ring-orange-500 outline-none border-gray-300 text-stone-800 focus:ring-2 transition-colors font-black">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Categoría</label>
                    <div class="flex gap-2">
                        <select id="inpProdCategoria" class="flex-1 border rounded px-3 py-2 text-sm focus:ring-orange-500 outline-none border-gray-300 text-stone-800 focus:ring-2 transition-colors font-medium">
                            <!-- Llenado con js -->
                        </select>
                        <button type="button" onclick="agregarNuevaCategoria()" class="bg-gray-100 px-3 border border-gray-300 rounded hover:bg-orange-100 hover:text-orange-600 hover:border-orange-300 text-stone-800 font-bold transition-colors" title="Añadir Nueva Categoría">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>

                <div class="flex gap-2 mt-6 pt-2">
                    <button type="button" onclick="cerrarModalProducto()" class="w-1/2 px-4 py-2.5 bg-gray-100 rounded-lg font-bold text-gray-700 hover:bg-gray-200 transition-colors">Cancelar</button>
                    <button type="submit" id="btnGuardarProd" class="w-1/2 px-4 py-2.5 bg-stone-800 text-white font-bold rounded-lg shadow-md hover:bg-stone-900 transition-colors">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/ventas.js"></script>
    <script>
        // === 1. GUARDIA DE SEGURIDAD BÁSICA (Ambos pueden entrar) ===
        if (!localStorage.getItem('usuario_id')) {
            window.location.href = 'index.html'; 
        }

        // === 2. LÓGICA DE INTERFAZ ===
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function cerrarSesión() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // === 3. CARGAR ROLES AL INICIAR ===
        window.addEventListener('DOMContentLoaded', () => {
            const nombreActual = localStorage.getItem('usuario_nombre');
            const rolActual = localStorage.getItem('usuario_rol');

            if (nombreActual) {
                document.getElementById('nombre-usuario').innerText = nombreActual;
                document.getElementById('avatar-letra').innerText = nombreActual.charAt(0).toUpperCase();
            }
            if (rolActual) {
                document.getElementById('rol-usuario').innerHTML = `<i class="fa-solid fa-circle text-[10px] mr-1"></i> ${rolActual}`;
            }

            if (rolActual === 'CAJERO') {
                const elementosAdmin = document.querySelectorAll('.solo-admin');
                elementosAdmin.forEach(elemento => {
                    elemento.style.display = 'none';
                });
            }
        });
    </script>
    <script src="js/security_guard.js"></script>
</body>
</html>
