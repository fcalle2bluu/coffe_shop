<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MokaPOS - Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { sidebar: '#3E2723', sidebarHover: '#4E342E', topbar: '#5D4037', logoBg: '#4E342E', mainBg: '#F4F1EA' } } }
        }
    </script>
</head>
<body class="bg-mainBg flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-sidebar text-gray-300 flex flex-col hidden md:flex shadow-xl z-20">
        <div class="h-14 bg-logoBg flex items-center justify-center text-white font-bold text-xl tracking-wider border-b border-[#3E2723]">
            <i class="fa-solid fa-mug-hot text-[#D7CCC8] mr-2"></i> MokaPOS
        </div>
        <div class="flex items-center p-4 border-b border-[#5D4037]">
            <div class="w-10 h-10 rounded-full bg-[#8D6E63] flex items-center justify-center text-white font-bold mr-3 shadow-inner">A</div>
            <div><p class="text-white text-sm font-semibold">admin</p><p class="text-xs text-emerald-400"><i class="fa-solid fa-circle text-[10px] mr-1"></i> CAJERO</p></div>
        </div>
        <nav class="flex-1 overflow-y-auto py-2 text-sm">
            <ul class="space-y-1">
                <li><a href="index.html" class="flex items-center px-4 py-2 hover:bg-sidebarHover hover:text-white transition-colors"><i class="fa-solid fa-house w-6 text-center text-[#BCAAA4]"></i><span>Inicio</span></a></li>
                <li><a href="almacen.html" class="flex items-center px-4 py-2 hover:bg-sidebarHover hover:text-white transition-colors"><i class="fa-solid fa-box w-6 text-center text-[#BCAAA4]"></i><span>Almacén</span></a></li>
                <li><a href="cotizaciones.html" class="flex items-center px-4 py-2 hover:bg-sidebarHover hover:text-white transition-colors"><i class="fa-solid fa-file-invoice w-6 text-center text-[#BCAAA4]"></i><span>Cotizaciones</span></a></li>
                <li><a href="ventas.html" class="flex items-center px-4 py-3 bg-sidebarHover border-l-4 border-[#E65100] text-white"><i class="fa-solid fa-cart-shopping w-6 text-center text-[#FFB74D]"></i><span class="font-medium">Punto de Venta</span></a></li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen">
        <header class="h-14 bg-topbar text-white flex items-center justify-between px-4 shadow-md z-10 shrink-0">
            <button class="focus:outline-none hover:bg-logoBg p-2 rounded transition-colors"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-lg font-bold tracking-wide">Punto de Venta (Terminal 1)</h1>
            <div class="text-sm font-semibold text-[#D7CCC8]" id="reloj">--:--:--</div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            
            <div class="w-2/3 p-4 flex flex-col bg-mainBg overflow-hidden">
                <div class="mb-4 relative shadow-sm">
                    <input type="text" id="buscarProducto" placeholder="Buscar por nombre o código..." class="w-full pl-10 pr-4 py-3 rounded-lg border-2 border-transparent focus:border-[#8D6E63] focus:outline-none text-gray-700 font-medium">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
                </div>

                <div class="flex-1 overflow-y-auto pr-2">
                    <div id="grid-productos" class="grid grid-cols-3 lg:grid-cols-4 gap-4 pb-4">
                        </div>
                </div>
            </div>

            <div class="w-1/3 bg-white shadow-l-xl border-l flex flex-col z-10">
                <div class="p-4 bg-[#FAFAFA] border-b border-gray-200">
                    <h2 class="text-[#4E342E] font-bold text-lg flex justify-between items-center">
                        <span><i class="fa-solid fa-receipt mr-2"></i>Ticket Actual</span>
                        <button onclick="limpiarCarrito()" class="text-red-500 hover:text-red-700 text-sm font-normal"><i class="fa-solid fa-trash-can mr-1"></i>Limpiar</button>
                    </h2>
                </div>

                <div class="flex-1 overflow-y-auto p-4 bg-white" id="ticket-items">
                    <div class="text-center text-gray-400 mt-10 text-sm">
                        <i class="fa-solid fa-basket-shopping text-4xl mb-3 opacity-20"></i>
                        <p>No hay productos en el ticket</p>
                    </div>
                </div>

                <div class="bg-[#F5F5F5] border-t p-4 flex flex-col gap-3">
                    <div class="flex justify-between items-center text-gray-600">
                        <span class="font-medium">Subtotal</span>
                        <span id="subtotal-ticket">S/ 0.00</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-xl font-bold text-[#3E2723]">TOTAL</span>
                        <span class="text-3xl font-black text-[#E65100]" id="total-ticket">S/ 0.00</span>
                    </div>
                    
                    <div class="mt-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Método de Pago</label>
                        <select id="metodo-pago" class="w-full border border-gray-300 rounded-lg p-3 bg-white focus:ring-2 focus:ring-[#8D6E63] font-medium text-gray-700">
                            <option value="EFECTIVO">💵 Efectivo</option>
                            <option value="QR">📱 Código QR (Transferencia)</option>
                            <option value="TARJETA">💳 Tarjeta (POS)</option>
                        </select>
                    </div>

                    <button onclick="procesarCobro()" id="btn-cobrar" class="w-full bg-[#5D4037] hover:bg-[#4E342E] text-white font-bold py-4 rounded-lg shadow-lg text-lg mt-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                        COBRAR S/ <span id="btn-total">0.00</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <div id="modalExito" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-96 p-6 flex flex-col items-center animate-[bounce_0.3s_ease-out]">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-3xl mb-4">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-1">¡Venta Exitosa!</h2>
            <p class="text-gray-500 mb-6" id="info-ticket">Ticket #0000</p>
            
            <button onclick="cerrarModalExito()" class="w-full bg-[#E65100] hover:bg-[#EF6C00] text-white font-bold py-3 rounded-lg mb-2">
                Nueva Venta
            </button>
            <button class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-lg">
                <i class="fa-solid fa-print mr-2"></i> Imprimir Recibo
            </button>
        </div>
    </div>

    <script src="js/ventas.js"></script>
</body>
</html>
