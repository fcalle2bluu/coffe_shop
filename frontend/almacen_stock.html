<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café La Paz - Stock de Insumos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        sidebar: '#020617',
                        sidebarHover: '#0f172a',
                        topbar: '#ffffff',
                        mainBg: '#f8fafc',
                        accent: '#f97316',
                        glass: 'rgba(255, 255, 255, 0.8)'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0,0,0,0.02)',
                    }
                } 
            } 
        }
    </script>

</head>
<body class="bg-mainBg font-sans flex min-h-screen text-slate-800">

    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-sidebar text-slate-400 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full md:sticky md:top-0 md:h-screen shrink-0 md:translate-x-0 transition-all duration-300 ease-in-out border-r border-slate-800">
        <div class="h-16 flex items-center px-6 gap-3 border-b border-slate-800/50">
            <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-accent/20">
                <i class="fa-solid fa-mug-hot text-white"></i>
            </div>
            <span class="text-white font-bold text-xl tracking-tight italic">Café <span class="text-accent">La Paz</span></span>
            <button onclick="toggleSidebar()" class="md:hidden ml-auto text-slate-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="p-4 border-b border-slate-800/30">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center text-white ring-2 ring-slate-700/50">
                    <span id="avatar-letra" class="font-black text-sm text-orange-500">U</span>
                </div>
                <div class="overflow-hidden">
                    <p id="nombre-usuario" class="text-slate-200 text-sm font-bold truncate tracking-tight">Cargando...</p>
                    <p id="rol-usuario" class="text-[9px] text-emerald-500 font-black uppercase tracking-[0.2em] opacity-80">ROL</p>
                </div>
            </div>
            <button onclick="cerrarSesión()" class="w-full flex items-center justify-center gap-2 py-2.5 text-[10px] font-black uppercase tracking-widest border border-slate-800 rounded-xl hover:bg-slate-900 hover:text-white transition-all text-slate-500">
                <i class="fa-solid fa-power-off text-[10px]"></i> Salir
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-gauge-high w-5 text-center text-orange-500/60"></i> <span>Dashboard</span>
            </a>
            <a href="almacen_stock.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 bg-orange-500/10 text-orange-500 font-bold solo-admin">
                <i class="fa-solid fa-boxes-stacked w-5 text-center text-orange-500/60"></i> <span>Stock Actual</span>
            </a>
            <a href="compras.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-cart-flatbed w-5 text-center text-orange-500/60"></i> <span>Compras Insumos</span>
            </a>
            <a href="inventario.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-clipboard-check w-5 text-center text-orange-500/60"></i> <span>Auditoría</span>
            </a>
            <a href="ventas.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-shop w-5 text-center text-orange-500/60"></i> <span>Punto de Venta</span>
            </a>
            <a href="caja.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium ">
                <i class="fa-solid fa-cash-register w-5 text-center text-orange-500/60"></i> <span>Control Caja</span>
            </a>
            <a href="parametros.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-gears w-5 text-center text-orange-500/60"></i> <span>Parámetros</span>
            </a>
                    <a href="pedidos_internos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium">
                <i class="fa-solid fa-clipboard-list w-5 text-center text-orange-500/60"></i> <span>Pedidos Internos</span>
            </a>
                    <a href="informe_general.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-900 hover:text-slate-200 font-medium solo-admin">
                <i class="fa-solid fa-file-pdf w-5 text-center text-orange-500/60"></i> <span>Informe General</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 min-h-screen">
        <header class="h-16 bg-white/70 backdrop-blur-md text-slate-900 border-b border-slate-200/60 flex items-center justify-between px-6 sticky top-0 z-30 shadow-premium">
            <button onclick="toggleSidebar()" class="focus:outline-none hover:bg-logoBg p-2 rounded transition-colors md:hidden"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-base sm:text-lg font-bold tracking-wide truncate ml-2 md:ml-0">Gestión de Stock</h1>
            <div class="flex items-center shrink-0 ml-2"><span id="header-nombre-usuario" class="mr-2 text-sm hidden sm:block">Cargando...</span></div>
        </header>

        <div class="flex-1 flex flex-col p-2 sm:p-4 md:p-6 min-h-screen">
            <div class="flex-1 flex flex-col bg-white rounded shadow-md border-t-4 border-stone-800 relative">
                <div class="p-3 sm:p-4 border-b flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white shrink-0 gap-3">
                    <h2 class="font-bold text-stone-800 text-base sm:text-lg"><i class="fa-solid fa-boxes-stacked mr-2"></i>Insumos y Materia Prima</h2>
                    <div class="flex w-full sm:w-auto space-x-2 sm:space-x-3 items-center">
                        <div class="relative flex-1 sm:w-56">
                            <input type="text" id="searchInput" placeholder="Buscar insumo..." class="w-full pl-8 pr-3 py-1.5 rounded border border-gray-300 text-stone-800 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors focus:outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- NUEVA FILA: Ingreso rápido -->
                <div class="bg-slate-50 border-t border-b border-gray-100 p-3 flex flex-wrap gap-2 items-end border-b  shrink-0 solo-admin">
                    <div class="flex-1 min-w-[200px]">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Nombre Insumo Nuevo</label>
                        <input type="text" id="inpRapidoNombre" class="w-full border rounded px-2 py-1.5 text-sm focus:ring-orange-500 focus:border-orange-500 outline-none border-gray-300 text-stone-800 focus:ring-2 focus:ring-orange-500 transition-colors">
                    </div>
                    <div class="w-64 flex flex-col">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Foto <i class="fa-solid fa-camera"></i></label>
                        <div class="flex items-center gap-2">
                            <img id="previewFoto" src="" class="hidden w-16 h-16 object-cover rounded-lg border-2 border-orange-500 shadow-md shrink-0 animate-pulse">
                            <div class="flex flex-col gap-1 w-full">
                                <!-- Input para Galería -->
                                <input type="file" id="inpRapidoFoto" accept="image/*" class="hidden" onchange="previewImagenRapida(event)">
                                <button onclick="document.getElementById('inpRapidoFoto').click()" class="flex items-center justify-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-slate-700 px-3 py-1.5 rounded text-xs transition-colors shadow-sm">
                                    <i class="fa-solid fa-image-portrait text-orange-500"></i> Galería
                                </button>
                                <!-- Input específico para Cámara -->
                                <input type="file" id="inpRapidoCamara" accept="image/*" capture="environment" class="hidden" onchange="previewImagenRapida(event)">
                                <button onclick="document.getElementById('inpRapidoCamara').click()" class="flex items-center justify-center gap-2 bg-orange-50 border border-orange-200 hover:bg-orange-100 text-orange-700 px-3 py-1.5 rounded text-xs transition-colors shadow-sm">
                                    <i class="fa-solid fa-camera"></i> Usar Cámara
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="w-24">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Unidad</label>
                        <input type="text" id="inpRapidoUnidad" placeholder="Ej: kg, L" class="w-full border rounded px-2 py-1.5 text-sm focus:ring-orange-500 outline-none border-gray-300 font-bold text-stone-800">
                    </div>
                    <div class="w-20">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Stk Mín</label>
                        <input type="number" id="inpRapidoMin" value="0" class="w-full border rounded px-2 py-1.5 text-sm text-center focus:ring-orange-500 outline-none border-gray-300 font-bold text-stone-800">
                    </div>
                    <button onclick="guardarInsumoRapido()" id="btnGuardarRapido" class="bg-orange-600 hover:bg-orange-700 transition-all duration-200 shadow-md hover:shadow-lg text-white font-bold py-1.5 px-4 rounded text-sm whitespace-nowrap h-9 self-end">
                        <i class="fa-solid fa-plus mr-1"></i> Crear
                    </button>
                </div>
                
                <div class="bg-slate-50 relative p-2 sm:p-4 rounded-b">
                    <div id="tabla-insumos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                        <!-- Las tarjetas se generan aquí vía JS -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/almacen_stock.js"></script>
    <script>
        const rolGuardia = localStorage.getItem('usuario_rol');
        if (!localStorage.getItem('usuario_id')) {
            window.location.href = 'index.html'; 
        } else if (rolGuardia === 'CAJERO') {
            alert('⛔ Acceso denegado.');
            window.location.href = 'dashboard.html';
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }
        function cerrarSesión() {
            localStorage.clear(); window.location.href = 'index.html';
        }
        window.addEventListener('DOMContentLoaded', () => {
            const n = localStorage.getItem('usuario_nombre');
            const r = localStorage.getItem('usuario_rol');
            if (n) {
                document.getElementById('nombre-usuario').innerText = n;
                document.getElementById('header-nombre-usuario').innerText = n;
                document.getElementById('avatar-letra').innerText = n.charAt(0).toUpperCase();
            }
            if (r) document.getElementById('rol-usuario').innerHTML = `<i class="fa-solid fa-circle text-[10px] mr-1"></i> ${r}`;
            if (r === 'CAJERO') document.querySelectorAll('.solo-admin').forEach(e => e.style.display = 'none');
        });
    </script>
    <script src="js/security_guard.js"></script>
    <script src="js/almacen_stock.js?v=2"></script>
</body>
</html>
